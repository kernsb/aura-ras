# ----------------------------------------------
# AuraRAS Global SSH Configuration
# ----------------------------------------------
AddressFamily inet

# Listen on standard admin port and the AuraRAS endpoint port
Port 22
Port 9922

# Explicitly allow global TCP forwarding for administrators
AllowTcpForwarding yes
GatewayPorts yes

# Aggressively prune dead tunnels
ClientAliveInterval 15
ClientAliveCountMax 3

# ----------------------------------------------
# AuraRAS Restricted Tunnel User Block
# ----------------------------------------------
Match User aura-tunnel
    # Restrict completely from getting a terminal/shell
    PermitTTY no
    ForceCommand echo 'This account is restricted to AuraRAS port forwarding.'
    
    # Disable unnecessary and potentially dangerous features
    X11Forwarding no
    AllowAgentForwarding no
    
    # Explicitly allow port forwarding (required for the reverse tunnels)
    AllowTcpForwarding yes
    
    # Only allow key-based authentication
    PasswordAuthentication no
    PubkeyAuthentication yes