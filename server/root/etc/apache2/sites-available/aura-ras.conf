# ---------------------------------------------------------
# HTTP (Port 80) - Redirect all traffic to HTTPS
# ---------------------------------------------------------
<VirtualHost *:80>
    ServerName 1350-asus.cla.purdue.edu
    
    # Force redirect to secure port
    Redirect permanent / https://1350-asus.cla.purdue.edu/
</VirtualHost>

# ---------------------------------------------------------
# HTTPS (Port 443) - Django Application via WSGI
# ---------------------------------------------------------
<VirtualHost *:443>
    ServerName 1350-asus.cla.purdue.edu
    
    DocumentRoot /var/www/aura-ras

    # SSL Configuration
    SSLEngine on
    
    # UPDATE THESE PATHS to your actual Sectigo/InCommon certificate files:
    SSLCertificateFile      /certs/1350-asus_cla_purdue_edu_cert.cer
    SSLCertificateKeyFile   /certs/1350-asus_cla_purdue_edu.key
    # InCommon usually requires the intermediate/chain certificate:
    SSLCertificateChainFile /certs/1350-asus_cla_purdue_edu_interm.cer

    # 1. Alias the static files so Apache serves them directly
    Alias /static/ /var/www/aura-ras/static/
    <Directory /var/www/aura-ras/static>
        Require all granted
    </Directory>

    # 2. Configure the WSGI Daemon
    # Running as user=aura-tunnel gives Django native access to the ~/.ssh folder!
    WSGIDaemonProcess aura_ras_server python-home=/var/www/aura-ras/venv python-path=/var/www/aura-ras user=aura-tunnel group=aura-tunnel threads=5
    WSGIProcessGroup aura_ras_server
    
    # 3. Point WSGI to the Django wsgi.py file
    WSGIScriptAlias / /var/www/aura-ras/aura_ras_server/wsgi.py

    <Directory /var/www/aura-ras/aura_ras_server>
        <Files wsgi.py>
            Require all granted
        </Files>
    </Directory>

    # Logging
    ErrorLog ${APACHE_LOG_DIR}/aura-ras_error.log
    CustomLog ${APACHE_LOG_DIR}/aura-ras_access.log combined
</VirtualHost>
